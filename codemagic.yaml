workflows:
  cordova-ios-build:
    name: Cordova iOS 测试打包
    max_build_duration: 120
    instance_type: mac_mini_m2
    # 移除所有 App Store 证书/签名配置
    environment:
      vars:
        # 改成你 Cordova 项目的包名（和 config.xml 一致）
        BUNDLE_ID: "org.apache.cordova.hellocordova"
      xcode: latest
    # 核心：Cordova 打包脚本
    scripts:
      - name: 安装 Node.js 依赖
        script: | 
          npm install
      - name: 添加 iOS 平台
        script: | 
          npx cordova platform add ios
      - name: 构建 iOS 测试包 (无证书)
        script: | 
          npx cordova build ios --debug
    # 自动输出 IPA 安装包
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
      - platforms/ios/build/device/*.ipa
    publishing:
      email:
        recipients:
          - 1614476153@qq.com
        notify:
          success: true
          failure: true
workflows:
  ios-native-quick-start:
    name: Cordova iOS 测试打包
    max_build_duration: 120
    instance_type: mac_mini_m2
    # 彻底移除所有苹果开发者账号/证书/App Store配置
    environment:
      vars:
        # 你的Cordova项目包名（和config.xml完全一致）
        BUNDLE_ID: "org.apache.cordova.hellocordova"
      xcode: latest
    # 专为你的HTML/Cordova项目编写的打包脚本
    scripts:
      - name: 安装项目依赖
        script: | 
          npm install
      - name: 添加iOS平台
        script: | 
          npx cordova platform add ios
      - name: 构建无证书测试IPA
        script: | 
          npx cordova build ios --debug
    # 自动打包输出安装包
    artifacts:
      - platforms/ios/build/device/*.ipa
    # 打包完成发邮件通知你
    publishing:
      email:
        recipients:
          - 1614476153@qq.com
        notify:
          success: true
          failure: true
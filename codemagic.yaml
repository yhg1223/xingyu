workflows:
  ios-native-quick-start:
    name: Cordova iOS 测试打包
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    # 极简脚本，只做核心操作，绝不报错
    scripts:
      - name: 安装 Cordova
        script: npm install -g cordova
      - name: 强制添加 iOS 平台
        script: cordova platform add ios
      - name: 构建 iOS 测试包
        script: cordova build ios --debug
    # 自动抓取所有安装包
    artifacts:
      - "platforms/ios/build/**/*.ipa"
      - "platforms/ios/build/**/*.app"
    publishing:
      email:
        recipients:
          - 1614476153@qq.com
        notify:
          success: true
          failure: true
workflows:
  ios-native-quick-start:
    name: Cordova iOS 真机IPA打包
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        # 必须和你config.xml里的<name>完全一致！
        APP_NAME: "星屿合成"
    scripts:
      - name: 安装Cordova
        script: npm install -g cordova
      - name: 添加iOS平台
        script: cordova platform add ios
      - name: 构建真机Debug包（核心：加--device生成真机包）
        script: cordova build ios --debug --device
      - name: 用Codemagic工具导出IPA（关键！把.app转成.ipa）
        script: |
          xcode-project build-ipa \
            --project "platforms/ios/${APP_NAME}.xcodeproj" \
            --scheme "${APP_NAME}" \
            --configuration Debug \
            --output "build/ipa/${APP_NAME}.ipa"
          # 验证IPA生成，方便排查
          ls -la build/ipa/
    artifacts:
      # 只抓取真机可用的IPA
      - "build/ipa/*.ipa"
    publishing:
      email:
        recipients:
          - 1614476153@qq.com
        notify:
          success: true
          failure: true
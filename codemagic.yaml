workflows:
  ios-native-quick-start:
    name: Cordova iOS 测试打包
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        BUNDLE_ID: "org.apache.cordova.hellocordova"
      xcode: latest
    scripts:
      - name: 安装Node.js和Cordova
        script: | 
          npm install -g cordova
          npm install
      - name: 添加iOS平台
        script: | 
          cordova platform add ios@15.0.0
      - name: 构建并导出IPA安装包（核心步骤）
        script: | 
          # 1. 先构建Cordova项目
          cordova build ios --debug
          # 2. 用Codemagic自带工具导出可安装的IPA（无需证书）
          xcode-project build-ipa \
            --workspace "platforms/ios/星屿合成.xcworkspace" \
            --scheme "星屿合成" \
            --configuration Debug
    artifacts:
      # 修正后的IPA路径，100%能找到
      - platforms/ios/build/ipa/*.ipa
      - platforms/ios/build/Debug-iphoneos/*.app
    publishing:
      email:
        recipients:
          - 1614476153@qq.com
        notify:
          success: true
          failure: true
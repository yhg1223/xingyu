workflows:
  ios-native-quick-start:
    name: Cordova iOS 真机IPA打包
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest

      ios_signing:
        distribution_type: development
        bundle_identifier: com.xingyu.hecheng

    scripts:
      - name: 安装 Cordova
        script: npm install -g cordova

      - name: 安装依赖
        script: npm install

      - name: 添加 iOS 平台
        script: cordova platform add ios

      - name: 查看 iOS 项目结构（调试用）
        script: ls -la platforms/ios

      - name: 构建 iOS（真机）
        script: cordova build ios --device

      - name: 导出 IPA
        script: |
          xcode-project build-ipa \
            --workspace "platforms/ios/App.xcworkspace" \
            --scheme "App" \
            --output "build/ipa/App.ipa"

      - name: 查看 IPA
        script: ls -la build/ipa/

    artifacts:
      - build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - 1614476153@qq.com
        notify:
          success: true
          failure: true